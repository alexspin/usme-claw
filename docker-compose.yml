services:
  db:
    image: timescale/timescaledb-ha:pg16
    container_name: usme-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-usme}
      POSTGRES_USER: ${POSTGRES_USER:-usme}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-usme_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - usme_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-usme}"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  usme_data:
